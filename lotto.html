<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 자판기</title>
    <script>
        function getLotto(){
            let lottoArray = [];
            for (let i=0; i<6;i++){
                num = Math.floor(Math.random() * 100);
                num = (num % 45) + 1;
                //console.log(`${i+1}번째 숫자 ${num}`);
            
                while (lottoArray.includes(num)){
                    num = Math.floor(Math.random() * 100);
                    num = (num % 45) + 1;
                    //console.log(`${i+1}@@@@@@@@@@번째 숫자 ${num}`);
                }

                lottoArray[i]=num;
            }               
        document.getElementById("lottoNumber").innerHTML = (lottoArray)        
        }
    </script>

    <style>
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
        }

        
        .container {
            
            width: 850px; 
            height: 800px; 
            position: relative;
            overflow: hidden; 
        }

        
        .lottoMc {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        
        .container2 {
            position: absolute; 
            top: 18.7%; 
            left: 48.2%; 
            transform: translate(-50%, -50%); 
            
            
            background-color: #000000; 
            padding: 15px 22px; 
            border-radius: 8px; 
            
            
            font-size: 45px; 
            font-weight: bold; 
            color: #ff0000; 
            
        }
        
        .container3 {
            position: absolute; 
            top: 44.8%; 
            left: 48.5%; 
            transform: translate(-50%, -50%); 
        
            background-color: #ffffff; 
            padding: 77.7px 175px; 
            border-radius: 8px; 
            
        }
        .lottoNumber{
            position: absolute; 
            top: 49%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            
            
            background-color: #00000000; 
            padding: 15px 22px; 
            border-radius: 8px; 
            
            font-size: 39px; 
            font-weight: bold;
            color: #ff0000;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7); 
           
        }
        .lottoButton{
            position: absolute; 
            top: 22.6%; 
            left: 84.7%; 
            transform: translate(-50%, -50%); 
            
            background-color: #e00e0e;
            width: 45px;
            height: 45px;
            border-radius: 50%; 
            
            border: none;
            cursor: pointer;
            
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .lottoButton:hover {
            background-color: #fffb00; 
        }

    </style>
</head>
<div>
    
    <div class="container">
        <img src="machine.png" alt="로또 자판기" class="lottoMc">
            <div class="container2">              
                <span>$$로또 자판기$$</span>     
            </div>
            <div class="container3">
                <div class="lottoNumber" id="lottoNumber"></div>
            </div>
            <div class="lottoButton">
                <input onclick="getLotto()" type="button" value="꾹" />
            </div>
    </div>
    
</body>
</html>
